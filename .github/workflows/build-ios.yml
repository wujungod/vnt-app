name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        xcodebuild -version

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

    - name: Install Flutter Rust Bridge dependencies
      run: |
        flutter pub global activate ffigen
        echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

    - name: Get dependencies
      run: flutter pub get

    - name: Build iOS (no codesign)
      id: build
      run: |
        set -o pipefail
        flutter build ios --release --no-codesign \
          --dart-define=FLUTTER_BUILD_NAME=1.0.0 \
          --dart-define=FLUTTER_BUILD_NUMBER=1 \
          2>&1 | tee build_log.txt

    - name: Publish build log on failure
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RUN_NUM="${{ github.run_number }}"
        COMMIT="${{ github.sha }}"
        # 保存日志
        tail -200 build_log.txt > build_error.txt
        # 创建 ci-logs 目录
        mkdir -p /tmp/ci-logs
        cd /tmp/ci-logs
        git init
        git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/wujungod/vnt-app.git
        git fetch origin ci-logs 2>/dev/null || true
        git checkout ci-logs 2>/dev/null || git checkout --orphan ci-logs
        # 清空旧内容
        git rm -rf . 2>/dev/null || true
        # 写入新的错误日志
        cp "${{ github.workspace }}/build_error.txt" "error_run${RUN_NUM}.txt"
        echo "# CI Build Error Logs" > README.md
        echo "" >> README.md
        echo "## Run #${RUN_NUM}" >> README.md
        echo "- **Commit:** ${COMMIT:0:8}" >> README.md
        echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> README.md
        echo "" >> README.md
        echo '```' >> README.md
        cat "error_run${RUN_NUM}.txt" >> README.md
        echo '```' >> README.md
        echo "" >> README.md
        echo "---" >> README.md
        echo "_Auto-generated by CI_" >> README.md
        git add README.md "error_run${RUN_NUM}.txt"
        git commit -m "ci: error log for run #${RUN_NUM}" || true
        git push origin ci-logs --force || true

    - name: Check build result
      run: |
        if [ -d "build/ios/iphoneos/Runner.app" ]; then
          echo "✅ Build succeeded"
        else
          echo "❌ Build failed"
          exit 1
        fi

    - name: Create IPA from build
      if: success()
      run: |
        mkdir -p build/ipa/Payload
        cp -r build/ios/iphoneos/Runner.app build/ipa/Payload/
        cd build/ipa
        zip -r ../vnt_app.ipa Payload

    - name: Upload IPA artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: vnt-app-ios
        path: build/vnt_app.ipa
        retention-days: 30
