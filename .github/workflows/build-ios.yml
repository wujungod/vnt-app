name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-ios:
    runs-on: macos-14  # M1 macOS runner
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

    - name: Install Flutter Rust Bridge dependencies
      run: |
        flutter pub global activate ffigen
        echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

    - name: Get dependencies
      run: flutter pub get

    - name: Disable code signing in Xcode project
      run: |
        cd ios
        # 禁用代码签名
        sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
        sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
        sed -i '' 's/CODE_SIGN_IDENTITY \[ sdk=iphoneos\* \] = "iPhone Developer";/CODE_SIGN_IDENTITY [ sdk=iphoneos* ] = "";/g' Runner.xcodeproj/project.pbxproj
        sed -i '' 's/CODE_SIGN_IDENTITY \[ sdk=iphoneos\* \] = "Apple Development";/CODE_SIGN_IDENTITY [ sdk=iphoneos* ] = "";/g' Runner.xcodeproj/project.pbxproj
        sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
        # 设置为不需要签名
        sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
        sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*/PROVISIONING_PROFILE_SPECIFIER = "";/g' Runner.xcodeproj/project.pbxproj

    - name: Build iOS (no codesign)
      run: flutter build ios --no-codesign --release

    - name: Create IPA
      run: |
        mkdir -p build/ipa/Payload
        cp -r build/ios/iphoneos/Runner.app build/ipa/Payload/
        cd build/ipa
        zip -r ../vnt_app.ipa Payload

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: vnt-app-ios
        path: build/vnt_app.ipa
        retention-days: 30
