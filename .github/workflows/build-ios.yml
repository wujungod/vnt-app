name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-ios:
    runs-on: macos-14  # M1 macOS runner
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        xcodebuild -version

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
        channel: 'stable'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

    - name: Install Flutter Rust Bridge dependencies
      run: |
        flutter pub global activate ffigen
        echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

    - name: Get dependencies
      run: flutter pub get

    - name: Build iOS (no codesign)
      run: |
        flutter build ios --release --no-codesign \
          --dart-define=FLUTTER_BUILD_NAME=1.0.0 \
          --dart-define=FLUTTER_BUILD_NUMBER=1 \
          2>&1 | tee build_log.txt || true

    - name: Always upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build-log
        path: build_log.txt
        retention-days: 7

    - name: Check build result
      run: |
        if [ -d "build/ios/iphoneos/Runner.app" ]; then
          echo "✅ Build succeeded"
        else
          echo "❌ Build failed"
          exit 1
        fi

    - name: Create IPA from build
      if: success()
      run: |
        mkdir -p build/ipa/Payload
        cp -r build/ios/iphoneos/Runner.app build/ipa/Payload/
        cd build/ipa
        zip -r ../vnt_app.ipa Payload

    - name: Upload IPA artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: vnt-app-ios
        path: build/vnt_app.ipa
        retention-days: 30
